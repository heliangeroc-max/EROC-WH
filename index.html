<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>库位可视化管理 · 入库分配系统</title>
<style>
  :root{
    --bg:#10131a;
    --panel:#171b24;
    --panel2:#1d2330;
    --border:#2a3142;
    --text:#e7ebf2;
    --muted:#8a93a8;
    --muted2:#5c6478;
    --free:#2ec46f;
    --free-dim:#173321;
    --occ:#e5484d;
    --occ-dim:#3a1e21;
    --reserve:#e8a33d;
    --reserve-dim:#3a2e17;
    --aisle:#3d6fa3;
    --func:#6b5b9a;
    --hazard:#f2b705;
    --accent:#3d8bfd;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{min-height:100vh;}

  .hazard-strip{
    height:6px;
    background:repeating-linear-gradient(135deg, var(--hazard) 0 14px, #1a1a1a 14px 28px);
    opacity:0.9;
  }

  .topbar{
    padding:18px 24px 14px;
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:1px solid var(--border);
    flex-wrap:wrap; gap:12px;
  }
  .topbar h1{
    font-size:20px; margin:0; font-weight:800; letter-spacing:0.5px;
  }
  .topbar h1 span{color:var(--muted); font-weight:500; font-size:13px; margin-left:10px; letter-spacing:0.2px;}
  .stats{display:flex; gap:22px;}
  .stat{text-align:right;}
  .stat .num{font-family:var(--mono); font-size:20px; font-weight:700;}
  .stat .lbl{font-size:11px; color:var(--muted); letter-spacing:0.5px;}
  .stat.free .num{color:var(--free);}
  .stat.occ .num{color:var(--occ);}
  .stat.reserve .num{color:var(--reserve);}

  .layout{
    display:grid;
    grid-template-columns: minmax(0,1fr) 380px;
    gap:0;
    align-items:start;
  }
  @media (max-width: 980px){
    .layout{grid-template-columns: 1fr;}
  }

  .mapPane{
    padding:20px 24px;
    overflow-x:auto;
  }
  .mapPane h2, .side h2{
    font-size:12px; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted);
    margin:0 0 12px 0; font-weight:700;
  }
  .legend{display:flex; gap:16px; margin-bottom:14px; flex-wrap:wrap;}
  .legend .item{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted);}
  .legend .swatch{width:11px; height:11px; border-radius:2px; display:inline-block;}

  .grid{
    display:grid;
    grid-template-columns: repeat(57, 15px);
    grid-auto-rows: 20px;
    gap:1px;
    position:relative;
    background:#0b0d12;
    padding:6px;
    border-radius:6px;
    border:1px solid var(--border);
    width:max-content;
  }
  .cell{
    border-radius:2px;
    font-size:8px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; white-space:nowrap;
    cursor:default;
    color:var(--muted);
  }
  .cell.label{
    color:var(--text);
    font-weight:700;
    background:transparent;
    font-size:9px;
  }
  .cell.bigletter{
    font-size:15px; font-weight:800; color:var(--muted2);
  }
  .cell.func{
    color:#fff; font-weight:600; font-size:8px; line-height:1.1; text-align:center; white-space:normal;
    padding:2px;
  }
  .cell.aisle-strip{ background:var(--aisle); opacity:0.55; }
  .cell.loc{
    cursor:pointer;
    color:rgba(0,0,0,0.55);
    font-family:var(--mono);
    font-weight:700;
    font-size:5.5px;
    transition:transform .12s ease;
    writing-mode: vertical-rl;
  }
  .cell.loc.free{ background:var(--free); }
  .cell.loc.occupied{ background:var(--occ); color:rgba(255,255,255,0.85); }
  .cell.loc.reserved{ background:var(--reserve); color:rgba(0,0,0,0.6); box-shadow:inset 0 0 0 1px rgba(0,0,0,0.35); }
  .cell.loc:hover{ transform:scale(1.35); z-index:5; box-shadow:0 0 0 1px #fff8; }
  .cell.loc.flash{ animation:flashcell 1.1s ease 2; }
  @keyframes flashcell{
    0%,100%{ box-shadow:0 0 0 0 rgba(242,183,5,0); }
    50%{ box-shadow:0 0 0 4px rgba(242,183,5,0.9); }
  }

  .side{
    background:var(--panel);
    border-left:1px solid var(--border);
    padding:20px;
    min-height:100%;
  }
  .card{
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:14px 16px;
    margin-bottom:16px;
  }
  .field{margin-bottom:10px;}
  .field label{display:block; font-size:11.5px; color:var(--muted); margin-bottom:4px;}
  .field input, .field select{
    width:100%; background:#12161f; border:1px solid var(--border); color:var(--text);
    border-radius:5px; padding:8px 9px; font-size:13px; font-family:var(--sans);
  }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--accent); }
  .btn{
    width:100%; padding:10px; border-radius:6px; border:none; cursor:pointer;
    font-weight:700; font-size:13.5px; letter-spacing:0.3px;
    background:var(--hazard); color:#1a1400;
    transition:filter .12s;
  }
  .btn:hover{ filter:brightness(1.08); }
  .btn.secondary{
    background:transparent; border:1px solid var(--border); color:var(--muted); font-weight:600;
  }
  .btn.secondary:hover{ color:var(--text); border-color:var(--muted2); }
  .btn.reserve-btn{ background:var(--reserve); color:#241a05; }

  .toast{
    margin-top:10px; font-size:12.5px; padding:9px 10px; border-radius:5px;
    display:none;
  }
  .toast.ok{ display:block; background:var(--free-dim); color:var(--free); border:1px solid #1f5c3a; }
  .toast.err{ display:block; background:var(--occ-dim); color:#ff8b8f; border:1px solid #5c2327; }

  .log{ max-height:230px; overflow-y:auto; }
  .log table{ width:100%; border-collapse:collapse; font-size:12px; }
  .log th{ text-align:left; color:var(--muted); font-weight:600; font-size:10.5px; padding:4px 4px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel2);}
  .log td{ padding:5px 4px; border-bottom:1px solid #232a38; }
  .log td.code{ font-family:var(--mono); color:var(--hazard); font-weight:700; }
  .log .undo{ cursor:pointer; color:var(--muted); font-size:11px; text-decoration:underline; }
  .log .undo:hover{ color:var(--occ); }
  .log-empty{ color:var(--muted2); font-size:12px; padding:8px 0; }

  .zoneBars{ max-height:260px; overflow-y:auto; }
  .zbar-row{ display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:11px; }
  .zbar-row .zname{ width:34px; color:var(--muted); font-family:var(--mono); }
  .zbar-track{ flex:1; height:7px; background:#0e1118; border-radius:4px; overflow:hidden; }
  .zbar-fill{ height:100%; background:linear-gradient(90deg, var(--free), var(--hazard)); }
  .zbar-row .zcount{ width:46px; text-align:right; color:var(--muted); font-family:var(--mono); font-size:10.5px;}

  .cellPopover{
    position:fixed; z-index:50; background:#20263380; backdrop-filter:blur(6px);
    background:#20263a; border:1px solid var(--border); border-radius:8px;
    padding:12px 14px; font-size:12.5px; box-shadow:0 8px 24px rgba(0,0,0,0.5);
    display:none; min-width:220px;
  }
  .cellPopover .code{ font-family:var(--mono); font-weight:800; font-size:15px; margin-bottom:6px; }
  .cellPopover .row{ display:flex; justify-content:space-between; margin-bottom:8px; color:var(--muted); }
  .cellPopover button{ width:100%; padding:7px; border-radius:5px; border:none; cursor:pointer; font-weight:700; font-size:12px; }

  ::-webkit-scrollbar{ height:8px; width:8px; }
  ::-webkit-scrollbar-thumb{ background:#2c3446; border-radius:4px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  .authOverlay{
    position:fixed; inset:0; z-index:100;
    background:radial-gradient(circle at 30% 20%, #1b2130 0%, #0b0d12 70%);
    display:flex; align-items:center; justify-content:center;
  }
  .authBox{
    width:340px; background:var(--panel2); border:1px solid var(--border); border-radius:10px;
    padding:26px 26px 22px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .authBox h2{ margin:0 0 4px; font-size:18px; font-weight:800; letter-spacing:0.3px; }
  .authBox .sub{ color:var(--muted); font-size:12px; margin-bottom:18px; }
  .authBox .field{ margin-bottom:12px; }
  .authBox .authBtn{
    width:100%; padding:10px; border-radius:6px; border:none; cursor:pointer; font-weight:700;
    background:var(--hazard); color:#1a1400; font-size:13.5px; margin-top:4px;
  }
  .authSwitch{ text-align:center; margin-top:14px; font-size:12px; color:var(--muted); }
  .authSwitch a{ color:var(--accent); cursor:pointer; text-decoration:underline; }
  .authErr{ color:#ff8b8f; font-size:12px; margin-top:8px; min-height:14px; }
  .authNote{ font-size:10.5px; color:var(--muted2); margin-top:14px; line-height:1.5; border-top:1px solid var(--border); padding-top:10px; }

  .userTag{ display:flex; align-items:center; gap:10px; font-size:12px; color:var(--muted); }
  .userTag b{ color:var(--text); }
  .userTag button{
    background:transparent; border:1px solid var(--border); color:var(--muted);
    border-radius:5px; padding:4px 9px; cursor:pointer; font-size:11.5px;
  }
  .userTag button:hover{ color:var(--text); border-color:var(--muted2); }

  .mapPane:fullscreen{
    background:var(--bg);
    padding:24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow:auto;
  }
  .mapPane:fullscreen #gridScaleWrapper{
    display:flex;
    justify-content:center;
    align-items:flex-start;
  }
  .mapPane:fullscreen .grid{
    transform-origin: top left;
  }
  .mapPane:fullscreen #btnFullscreen{
    position:fixed; top:20px; right:24px; z-index:200;
    background:var(--panel2); border-color:var(--muted2);
  }
  .mapPane:fullscreen h2{ font-size:20px; }
  .mapPane:fullscreen .legend{ font-size:14px; margin-bottom:20px; }
  .mapPane:fullscreen .legend .swatch{ width:16px; height:16px; }
</style>
</head>
<body>

<div class="hazard-strip"></div>
<div class="topbar">
  <h1>库位可视化管理<span>入库分配系统 · 布局图实时映射</span></h1>
  <div style="display:flex; align-items:center; gap:22px; flex-wrap:wrap;">
    <div class="userTag" style="display:flex;">
      操作人（可选）
      <input id="operatorName" type="text" placeholder="填写你的名字，方便追溯记录" style="width:150px; background:#12161f; border:1px solid var(--border); color:var(--text); border-radius:5px; padding:5px 8px; font-size:12px;">
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="statTotal">--</div><div class="lbl">总库位</div></div>
      <div class="stat free"><div class="num" id="statFree">--</div><div class="lbl">空闲</div></div>
      <div class="stat reserve"><div class="num" id="statReserve">--</div><div class="lbl">预占用</div></div>
      <div class="stat occ"><div class="num" id="statOcc">--</div><div class="lbl">占用</div></div>
      <div class="stat"><div class="num" id="statRate">--</div><div class="lbl">占用率</div></div>
    </div>
  </div>
</div>

<div class="layout" id="mainLayout">
  <div class="mapPane" id="mapPane">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
      <h2 style="margin:0;">仓库布局图</h2>
      <button id="btnFullscreen" style="background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:6px 12px; font-size:11.5px; cursor:pointer; display:flex; align-items:center; gap:6px;">
        <span id="fsIcon">⛶</span> <span id="fsLabel">全屏显示</span>
      </button>
    </div>
    <div class="legend">
      <div class="item"><span class="swatch" style="background:var(--free)"></span>空闲库位</div>
      <div class="item"><span class="swatch" style="background:var(--occ)"></span>占用库位</div>
      <div class="item"><span class="swatch" style="background:var(--reserve)"></span>预占用库位</div>
      <div class="item"><span class="swatch" style="background:var(--aisle);opacity:.55"></span>货架分隔</div>
      <div class="item"><span class="swatch" style="background:var(--func)"></span>功能区域</div>
    </div>
    <div id="gridScaleWrapper"><div class="grid" id="grid"></div></div>
  </div>

  <div class="side">
    <div class="card">
      <h2>新增入库</h2>
      <div class="field">
        <label>入库单号</label>
        <input id="fOrder" type="text" placeholder="自动生成，可修改">
      </div>
      <div class="field">
        <label>货物名称 / SKU</label>
        <input id="fGoods" type="text" placeholder="例如：电视机A / SKU-1024">
      </div>
      <div class="field">
        <label>数量（= 占用库位数）</label>
        <input id="fQty" type="number" min="1" value="1">
      </div>
      <div class="field" id="fZoneWrap">
        <label>指定区域（可留空 = 自动全库分配）</label>
        <select id="fZone"><option value="">不限区域，自动分配</option></select>
      </div>
      <div class="field" style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
        <input type="checkbox" id="fManualMode" style="width:auto;">
        <label for="fManualMode" style="margin:0; cursor:pointer;">手动指定库位（不自动分配）</label>
      </div>
      <div class="field" id="fManualCodesWrap" style="display:none;">
        <label>库位编号（多个用逗号分隔，需与数量一致）</label>
        <input id="fManualCodes" type="text" placeholder="例如：D1-01,D1-02">
      </div>
      <button class="btn" id="btnAllocate">分配库位</button>
      <div class="toast" id="toast"></div>
    </div>

    <div class="card">
      <h2>批量导入入库安排</h2>
      <div class="field">
        <label>粘贴清单（每行一条：SKU,库位数,区域(可选)）</label>
        <textarea id="batchInput" rows="6" placeholder="例如：
电视机A,5,D1
电视机B,3,D1-D3
音响C,2,B1;B2;C1
遥控器D,4" style="width:100%; background:#12161f; border:1px solid var(--border); color:var(--text); border-radius:5px; padding:8px 9px; font-size:12.5px; font-family:var(--mono); resize:vertical;"></textarea>
        <div style="font-size:11px; color:var(--muted2); margin-top:6px; line-height:1.6;">
          区域列支持：单个区域(D1)、范围(D1-D3，同字母前缀内)、多个区域用分号隔开(B1;B2;C1)，留空=全库自动分配。<br>
          如果第一行是表头（SKU/库位数/区域，中英文均可），会自动跳过不当作数据处理。
        </div>
      </div>
      <div class="field">
        <label>或上传 CSV 文件（同样三列，表头可选）</label>
        <input id="batchFile" type="file" accept=".csv,text/csv" style="width:100%; background:#12161f; border:1px solid var(--border); color:var(--text); border-radius:5px; padding:6px 8px; font-size:12px;">
      </div>
      <div style="margin-bottom:10px;">
        <span id="btnDownloadTemplate" style="cursor:pointer; color:var(--accent); font-size:11.5px; text-decoration:underline;">下载导入模板（CSV）</span>
      </div>
      <button class="btn" id="btnBatchImport">开始批量导入</button>
      <div class="toast" id="batchToast"></div>
      <div id="batchResultWrap" style="display:none; margin-top:12px;">
        <div style="font-size:11.5px; color:var(--muted); margin-bottom:6px;">导入结果</div>
        <div style="max-height:220px; overflow-y:auto;">
          <table style="width:100%; border-collapse:collapse; font-size:11.5px;">
            <thead><tr>
              <th style="text-align:left; color:var(--muted); font-weight:600; padding:4px;">货物/SKU</th>
              <th style="text-align:left; color:var(--muted); font-weight:600; padding:4px;">结果</th>
              <th style="text-align:left; color:var(--muted); font-weight:600; padding:4px;">库位/原因</th>
            </tr></thead>
            <tbody id="batchResultBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>预占用库位</h2>
      <div class="field">
        <label>货物名称 / SKU（可选）</label>
        <input id="rGoods" type="text" placeholder="例如：电视机A / SKU-1024">
      </div>
      <div class="field">
        <label>预占原因 / 备注</label>
        <input id="rNote" type="text" placeholder="例如：预留给大客户 / 货架维修">
      </div>
      <div class="field">
        <label>预占数量</label>
        <input id="rQty" type="number" min="1" value="1">
      </div>
      <div class="field">
        <label>指定区域（可留空 = 自动全库选取）</label>
        <select id="rZone"><option value="">不限区域，自动选取</option></select>
      </div>
      <button class="btn reserve-btn" id="btnReserve">设为预占用</button>
      <div class="toast" id="reserveToast"></div>
    </div>

    <div class="card">
      <h2>分配记录</h2>
      <div class="log" id="logWrap">
        <div class="log-empty">暂无入库记录</div>
      </div>
    </div>

    <div class="card">
      <h2>各区域占用情况</h2>
      <div class="zoneBars" id="zoneBars"></div>
    </div>

    <button class="btn" id="btnManualSave" style="margin-bottom:10px;">手动保存</button>
    <div class="field" style="margin-bottom:8px;">
      <label>导出语言 / Export Language</label>
      <select id="exportLang">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
    <button class="btn secondary" id="btnExport">导出库位详情（CSV）</button>
    <button class="btn secondary" id="btnReset" style="margin-top:10px;">重置全部占用状态</button>
    <div class="toast" id="saveToast"></div>
  </div>
</div>

<div class="cellPopover" id="popover">
  <div class="code" id="popCode"></div>
  <div class="row"><span>区域</span><span id="popZone"></span></div>
  <div class="row"><span>状态</span><span id="popStatus"></span></div>
  <div id="popDetails" style="display:none; margin:-2px 0 8px 0; padding:8px 9px; background:#12161f; border-radius:6px; font-size:11.5px; color:var(--muted); line-height:1.7;"></div>
  <div id="popActions" style="display:flex; flex-direction:column; gap:6px;"></div>
  <div id="popInboundForm" style="display:none; margin-top:4px;">
    <input id="popGoods" type="text" placeholder="货物名称 / SKU" style="width:100%; background:#12161f; border:1px solid var(--border); color:var(--text); border-radius:5px; padding:7px 8px; font-size:12.5px; margin-bottom:8px;">
    <div style="display:flex; gap:6px;">
      <button id="popInboundConfirm" style="flex:1; background:var(--occ); color:#fff;">确认入库</button>
      <button id="popInboundCancel" style="flex:1; background:transparent; border:1px solid var(--border); color:var(--muted);">取消</button>
    </div>
  </div>
  <div id="popReserveForm" style="display:none; margin-top:4px;">
    <input id="popReserveGoods" type="text" placeholder="货物名称 / SKU（可选）" style="width:100%; background:#12161f; border:1px solid var(--border); color:var(--text); border-radius:5px; padding:7px 8px; font-size:12.5px; margin-bottom:8px;">
    <input id="popReserveNote" type="text" placeholder="预占原因 / 备注（可选）" style="width:100%; background:#12161f; border:1px solid var(--border); color:var(--text); border-radius:5px; padding:7px 8px; font-size:12.5px; margin-bottom:8px;">
    <div style="display:flex; gap:6px;">
      <button id="popReserveConfirm" style="flex:1; background:var(--reserve); color:#241a05;">确认预占用</button>
      <button id="popReserveCancel" style="flex:1; background:transparent; border:1px solid var(--border); color:var(--muted);">取消</button>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { initializeFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaQFJwh4AmdTrZEEj_jOYXe3soPTV74gU",
  authDomain: "warehouse-location-system.firebaseapp.com",
  projectId: "warehouse-location-system",
  storageBucket: "warehouse-location-system.firebasestorage.app",
  messagingSenderId: "294139303400",
  appId: "1:294139303400:web:cbd8b5368e475563a8805d"
};
const fbApp = initializeApp(firebaseConfig);
// 部分网络环境（企业防火墙/某些安全软件）会拦截 Firestore 默认的流式连接，
// 这里开启自动检测长轮询兼容模式，遇到这种网络会自动切换连接方式。
// 另外明确指定数据库 ID 为 'default'，对应 Firebase 控制台里实际创建的那个数据库。
const db = initializeFirestore(fbApp, {
  experimentalAutoDetectLongPolling: true,
  useFetchStreams: false
}, 'default');

(function(){
  const WDATA = JSON.parse(document.getElementById('wdata-json').textContent);
  const LOCATIONS = WDATA.locations;   // [{code,zone,row,col}]
  const BLOCKS = WDATA.blocks;         // [{label,row,col,rowspan,colspan,color}]
  const ZONES = WDATA.zones;
  const MAX_COL = WDATA.maxCol;
  const MAX_ROW = WDATA.maxRow;

  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${MAX_COL}, 15px)`;
  grid.style.gridTemplateRows = `repeat(${MAX_ROW}, 20px)`;

  const FUNC_LABELS = new Set(['INBOUND GATE','PASS WAY','Well done packing for scan','Outbound Gate',
    'Cancel order\ntermpory','OFFICE','Packing\narea','TV packing','TV welldone area','MATERIAL']);

  let status = {};   // code -> 'occupied' | 'reserved' (absence = free)
  let log = [];      // [{id,time,order,goods,note,qty,zone,codes,type,operator}]
  let currentUser = null;

  const locByCode = {};
  LOCATIONS.forEach(l => locByCode[l.code] = l);

  // ---------- Firebase / Firestore ----------
  const statusDocRef = doc(db, 'wms', 'status');
  const logDocRef = doc(db, 'wms', 'log');

  async function loadState(){
    try{
      const snap = await getDoc(statusDocRef);
      status = snap.exists() ? (snap.data().data || {}) : {};
    }catch(e){ console.error('loadState(status) failed', e); status = {}; }
    try{
      const snap2 = await getDoc(logDocRef);
      log = snap2.exists() ? (snap2.data().entries || []) : [];
    }catch(e){ console.error('loadState(log) failed', e); log = []; }
  }
  function withTimeout(promise, ms){
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject({ code: 'timeout' }), ms))
    ]);
  }
  async function saveStatus(){
    try{ await withTimeout(setDoc(statusDocRef, { data: status }), 8000); }
    catch(e){ console.error('saveStatus failed', e); showConnErr(e); }
  }
  async function saveLog(){
    try{ await withTimeout(setDoc(logDocRef, { entries: log }), 8000); }
    catch(e){ console.error('saveLog failed', e); showConnErr(e); }
  }
  function showConnErr(e){
    const t = document.getElementById('toast');
    if(!t) return;
    if(e && e.code === 'timeout'){
      t.textContent = '⏱ 网络较慢，改动已在本地排队，恢复网络后会自动同步';
    } else {
      t.textContent = '⚠ 无法连接数据库，改动可能未保存，请检查网络后重试';
    }
    t.className = 'toast err';
  }

  // 实时同步：其他人做的改动会自动推送过来并刷新界面
  let suppressNextStatusPush = false;
  let suppressNextLogPush = false;
  onSnapshot(statusDocRef, (snap) => {
    if(!snap.exists() || !currentUser) return;
    status = snap.data().data || {};
    refreshAllVisuals();
  });
  onSnapshot(logDocRef, (snap) => {
    if(!snap.exists() || !currentUser) return;
    log = snap.data().entries || [];
    renderLog();
  });

  // ---------- render map ----------
  function buildStaticBlocks(){
    BLOCKS.forEach(b => {
      const div = document.createElement('div');
      const label = (b.label||'').trim();
      let cls = 'cell';
      if(b.color === '#4F81BD'){
        cls += ' aisle-strip';
      } else if(b.color){
        cls += ' func';
        div.style.background = b.color;
      } else if(label && b.colspan === 1 && b.rowspan >= 5){
        cls += ' bigletter';
      } else if(label){
        cls += ' label';
      }
      div.className = cls;
      div.style.gridColumn = `${b.col} / span ${b.colspan}`;
      div.style.gridRow = `${b.row} / span ${b.rowspan}`;
      if(label) div.textContent = label;
      grid.appendChild(div);
    });
  }

  function locCellId(code){ return 'loc-' + code.replace(/[^A-Za-z0-9_-]/g,''); }

  function buildLocationCells(){
    LOCATIONS.forEach(l => {
      const div = document.createElement('div');
      div.className = 'cell loc';
      div.id = locCellId(l.code);
      div.style.gridColumn = `${l.col} / span 1`;
      div.style.gridRow = `${l.row} / span 1`;
      div.textContent = l.code;
      div.title = l.code;
      div.addEventListener('click', (ev) => openPopover(l.code, ev));
      grid.appendChild(div);
    });
  }

  function refreshLocationVisual(code){
    const el = document.getElementById(locCellId(code));
    if(!el) return;
    const val = status[code];
    el.classList.remove('free','occupied','reserved');
    if(val === 'occupied') el.classList.add('occupied');
    else if(val === 'reserved') el.classList.add('reserved');
    else el.classList.add('free');
  }
  function refreshAllVisuals(){
    LOCATIONS.forEach(l => refreshLocationVisual(l.code));
    updateStats();
    updateZoneBars();
  }

  // ---------- popover ----------
  const pop = document.getElementById('popover');
  const popCode = document.getElementById('popCode');
  const popZone = document.getElementById('popZone');
  const popStatus = document.getElementById('popStatus');
  const popActions = document.getElementById('popActions');
  let popCurrentCode = null;

  const STATUS_LABEL = { occupied:'占用', reserved:'预占用', free:'空闲' };

  function combineGoodsNote(goods, note){
    if(goods && note) return `${goods}（${note}）`;
    if(goods) return goods;
    if(note) return note;
    return '';
  }

  function makeActionBtn(text, bg, color, onClick){
    const b = document.createElement('button');
    b.textContent = text;
    b.style.background = bg;
    b.style.color = color;
    b.addEventListener('click', onClick);
    return b;
  }

  function findLatestRecordForCode(code){
    for(let i = log.length - 1; i >= 0; i--){
      const r = log[i];
      const codes = r.codes || (r.code ? [r.code] : []);
      if(codes.includes(code)) return r;
    }
    return null;
  }

  function openPopover(code, ev){
    popCurrentCode = code;
    const st = status[code] || 'free';
    popCode.textContent = code;
    popZone.textContent = locByCode[code].zone;
    popStatus.textContent = STATUS_LABEL[st];
    popActions.innerHTML = '';
    hideInboundForm();

    const popDetails = document.getElementById('popDetails');
    if(st === 'occupied' || st === 'reserved'){
      const rec = findLatestRecordForCode(code);
      if(rec){
        popDetails.innerHTML = `
          <div><b style="color:var(--text)">${escapeHtml(combineGoodsNote(rec.goods, rec.note) || '（无备注）')}</b></div>
          <div>单号：${escapeHtml(rec.order || '—')}　订单总数量：${rec.qty != null ? rec.qty : '—'}</div>
          <div style="color:var(--muted2)">（本库位固定占1个单位；订单总数量是同一单号占用的库位总数）</div>
          <div>操作人：${escapeHtml(rec.operator || '未填写')}</div>
          <div>时间：${escapeHtml(rec.time || '—')}</div>
        `;
        popDetails.style.display = 'block';
      } else {
        popDetails.innerHTML = '（没有找到相关记录，可能是较早期直接切换状态所致）';
        popDetails.style.display = 'block';
      }
    } else {
      popDetails.style.display = 'none';
    }

    if(st === 'free'){
      popActions.appendChild(makeActionBtn('手动入库到此库位', 'var(--hazard)', '#1a1400', () => showInboundForm(code)));
      popActions.appendChild(makeActionBtn('标记为占用', 'var(--occ)', '#fff', () => setStatus(code, 'occupied')));
      popActions.appendChild(makeActionBtn('标记为预占用', 'var(--reserve)', '#241a05', () => showReserveForm(code)));
    } else if(st === 'reserved'){
      popActions.appendChild(makeActionBtn('转为正式占用', 'var(--occ)', '#fff', () => setStatus(code, 'occupied')));
      popActions.appendChild(makeActionBtn('释放为空闲', 'var(--free)', '#062', () => setStatus(code, 'free')));
    } else {
      popActions.appendChild(makeActionBtn('释放为空闲', 'var(--free)', '#062', () => setStatus(code, 'free')));
    }

    const rect = ev.target.getBoundingClientRect();
    let left = rect.left + 20;
    let top = rect.top;
    if(left > window.innerWidth - 240) left = window.innerWidth - 250;
    if(top > window.innerHeight - 220) top = window.innerHeight - 230;
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
    pop.style.display = 'block';
  }
  document.addEventListener('click', (ev) => {
    if(!pop.contains(ev.target) && !ev.target.classList.contains('loc')){
      pop.style.display = 'none';
      hideInboundForm();
      hideReserveForm();
    }
  });

  // ---------- 弹窗内嵌的"手动入库到此库位"小表单 ----------
  const popInboundForm = document.getElementById('popInboundForm');
  const popGoods = document.getElementById('popGoods');
  function showInboundForm(code){
    popActions.style.display = 'none';
    hideReserveForm(true);
    popInboundForm.style.display = 'block';
    popGoods.value = '';
    popGoods.focus();
  }
  function hideInboundForm(skipRestoreActions){
    popInboundForm.style.display = 'none';
    if(!skipRestoreActions) popActions.style.display = 'flex';
  }
  document.getElementById('popInboundCancel').addEventListener('click', () => hideInboundForm());
  popGoods.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') document.getElementById('popInboundConfirm').click();
  });
  document.getElementById('popInboundConfirm').addEventListener('click', async () => {
    const code = popCurrentCode;
    const goods = popGoods.value.trim();
    if(!goods){
      popGoods.placeholder = '请填写货物名称再确认';
      popGoods.focus();
      return;
    }
    if(status[code]){
      // 极端情况下弹窗打开期间被别处改动了状态
      pop.style.display = 'none';
      showToast(`${code} 已不是空闲状态，操作已取消`, false);
      return;
    }
    const order = nextOrderNo('RK');
    status[code] = 'occupied';
    log.push({
      id: Date.now(), time: new Date().toLocaleString('zh-CN'),
      order, goods, qty: 1, zone: locByCode[code].zone, codes: [code],
      type: '手动入库', operator: currentUser
    });
    await saveStatus();
    await saveLog();
    refreshLocationVisual(code);
    updateStats();
    updateZoneBars();
    renderLog();
    pop.style.display = 'none';
    hideInboundForm();
    showToast(`已手动入库至 ${code}`, true);
  });

  // ---------- 弹窗内嵌的"标记为预占用"小表单 ----------
  const popReserveForm = document.getElementById('popReserveForm');
  const popReserveGoods = document.getElementById('popReserveGoods');
  const popReserveNote = document.getElementById('popReserveNote');
  function showReserveForm(code){
    popActions.style.display = 'none';
    hideInboundForm(true);
    popReserveForm.style.display = 'block';
    popReserveGoods.value = '';
    popReserveNote.value = '';
    popReserveGoods.focus();
  }
  function hideReserveForm(skipRestoreActions){
    popReserveForm.style.display = 'none';
    if(!skipRestoreActions) popActions.style.display = 'flex';
  }
  document.getElementById('popReserveCancel').addEventListener('click', () => hideReserveForm());
  popReserveNote.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') document.getElementById('popReserveConfirm').click();
  });
  document.getElementById('popReserveConfirm').addEventListener('click', async () => {
    const code = popCurrentCode;
    const goods = popReserveGoods.value.trim();
    const note = popReserveNote.value.trim();
    if(status[code]){
      pop.style.display = 'none';
      showToast(`${code} 已不是空闲状态，操作已取消`, false);
      return;
    }
    const order = nextOrderNo('YZ');
    status[code] = 'reserved';
    log.push({
      id: Date.now(), time: new Date().toLocaleString('zh-CN'),
      order, goods, note, qty: 1, zone: locByCode[code].zone, codes: [code],
      type: '预占用', operator: currentUser
    });
    await saveStatus();
    await saveLog();
    refreshLocationVisual(code);
    updateStats();
    updateZoneBars();
    renderLog();
    pop.style.display = 'none';
    hideReserveForm();
    showToast(`已将 ${code} 设为预占用`, true);
  });

  async function setStatus(code, newStatus){
    const fromLabel = STATUS_LABEL[status[code] || 'free'];
    const toLabel = STATUS_LABEL[newStatus];
    if(newStatus === 'free') delete status[code];
    else status[code] = newStatus;
    await saveStatus();
    log.push({
      id: Date.now(), time: new Date().toLocaleString('zh-CN'),
      order: '—', goods: `手动修改：${fromLabel} → ${toLabel}`, qty: 1,
      zone: locByCode[code].zone, codes: [code], type: '手动修改', operator: currentUser
    });
    await saveLog();
    refreshLocationVisual(code);
    updateStats();
    updateZoneBars();
    renderLog();
    pop.style.display = 'none';
  }

  // ---------- stats ----------
  function updateStats(){
    const total = LOCATIONS.length;
    const occ = Object.keys(status).filter(c => status[c] === 'occupied').length;
    const reserved = Object.keys(status).filter(c => status[c] === 'reserved').length;
    const free = total - occ - reserved;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statFree').textContent = free;
    document.getElementById('statReserve').textContent = reserved;
    document.getElementById('statOcc').textContent = occ;
    document.getElementById('statRate').textContent = total ? Math.round((occ+reserved)/total*100) + '%' : '0%';
  }

  function updateZoneBars(){
    const wrap = document.getElementById('zoneBars');
    wrap.innerHTML = '';
    ZONES.forEach(z => {
      const cells = LOCATIONS.filter(l => l.zone === z);
      const occ = cells.filter(l => status[l.code]).length;
      const pct = cells.length ? Math.round(occ/cells.length*100) : 0;
      const row = document.createElement('div');
      row.className = 'zbar-row';
      row.innerHTML = `<span class="zname">${z}</span>
        <span class="zbar-track"><span class="zbar-fill" style="width:${pct}%"></span></span>
        <span class="zcount">${occ}/${cells.length}</span>`;
      wrap.appendChild(row);
    });
  }

  // ---------- 操作人（可选，不做任何登录校验） ----------
  const operatorInput = document.getElementById('operatorName');
  function loadOperatorName(){
    try{
      const saved = localStorage.getItem('wms-operator-name');
      if(saved) operatorInput.value = saved;
    }catch(e){}
    currentUser = operatorInput.value.trim() || '未填写';
  }
  operatorInput.addEventListener('input', () => {
    currentUser = operatorInput.value.trim() || '未填写';
    try{ localStorage.setItem('wms-operator-name', operatorInput.value.trim()); }catch(e){}
  });
  function buildZoneOptions(){
    const sels = [document.getElementById('fZone'), document.getElementById('rZone')];
    sels.forEach(sel => {
      ZONES.forEach(z => {
        const opt = document.createElement('option');
        opt.value = z; opt.textContent = z;
        sel.appendChild(opt);
      });
    });
  }

  // ---------- allocation ----------
  // 入库数量 = 需要占用的库位数量：按顺序找出 qty 个空闲库位（数量不足则不分配，返回可用空闲数供提示）
  // zoneFilter 可以是 null（不限）、单个区域字符串，或区域数组（多区域池中一起找）
  function findFreeSlots(zoneFilter, qty){
    let pool;
    if(!zoneFilter){
      pool = LOCATIONS;
    } else if(Array.isArray(zoneFilter)){
      const zoneSet = new Set(zoneFilter);
      pool = LOCATIONS.filter(l => zoneSet.has(l.zone));
    } else {
      pool = LOCATIONS.filter(l => l.zone === zoneFilter);
    }
    const free = pool.filter(l => !status[l.code]);
    if(free.length < qty){
      return { ok:false, available: free.length };
    }
    return { ok:true, codes: free.slice(0, qty).map(l => l.code) };
  }

  // 解析区域字段：支持单个区域、分号分隔的多个区域、连字符范围（如 D1-D3）
  function parseZoneField(raw){
    if(!raw) return { zones: null, error: null };
    const tokens = raw.split(/[;；]+/).map(s => s.trim()).filter(Boolean);
    const result = new Set();
    for(const token of tokens){
      const rangeMatch = token.match(/^([A-Za-z]+)(\d+)-([A-Za-z]+)(\d+)$/);
      if(rangeMatch){
        const [, prefix1, n1, prefix2, n2] = rangeMatch;
        if(prefix1.toUpperCase() !== prefix2.toUpperCase()){
          return { zones: null, error: `范围"${token}"前缀不一致，需同一字母区（如 D1-D3）` };
        }
        const start = parseInt(n1, 10), end = parseInt(n2, 10);
        if(start > end){
          return { zones: null, error: `范围"${token}"起始编号大于结束编号` };
        }
        for(let i = start; i <= end; i++){
          result.add(`${prefix1.toUpperCase()}${i}`);
        }
      } else {
        result.add(token.toUpperCase());
      }
    }
    const zones = [...result];
    const invalid = zones.filter(z => !ZONES.includes(z));
    if(invalid.length > 0){
      return { zones: null, error: `区域不存在：${invalid.join('、')}` };
    }
    return { zones, error: null };
  }

          updateZoneBars();
          renderLog();
          showToast(`已撤销 ${rec.order}，${codes.length} 个库位恢复空闲`, true);

      });
    });

  const HEADER_KEYWORDS = ['sku', '库位数', '数量', '货物', '区域', 'zone', 'qty', 'quantity', 'goods', 'code', '编号'];
  function looksLikeHeaderRow(rawLine){
    const lower = rawLine.toLowerCase();
    return HEADER_KEYWORDS.some(k => lower.includes(k));
  }

  function parseBatchLines(text){
    const rawLines = text.split('\n').map(l => l.trim()).filter(Boolean);
    if(rawLines.length > 0 && looksLikeHeaderRow(rawLines[0])){
      rawLines.shift(); // 跳过表头行（中英文关键词识别）
    }
    return rawLines.map(line => {
      const parts = line.split(/[,，\t]+/).map(s => s.trim());
      return { raw: line, goods: parts[0] || '', qty: parts[1] || '', zone: parts[2] || '' };
    });
  }

    const rows = [headers, ...examples];

      const s = String(v);
      if(/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    };
    const csvContent = rows.map(r => r.map(csvEscape).join(',')).join('\r\n');

  async function runBatchImport(lines){
    const results = [];
    for(const item of lines){
      const goods = item.goods;
      const qty = parseInt(item.qty, 10);

      if(!goods){
        results.push({ goods: item.raw, ok:false, msg:'缺少货物名称/SKU' });
        continue;
      }
      if(!qty || qty < 1){
        results.push({ goods, ok:false, msg:'数量无效（需为正整数）' });
        continue;
      }
      const zoneRaw = item.zone;
      const { zones, error: zoneError } = parseZoneField(zoneRaw);
      if(zoneError){
        results.push({ goods, ok:false, msg: zoneError });
        continue;
      }
      const result = findFreeSlots(zones, qty);
      if(!result.ok){
        const scope = zones ? `指定区域（${zones.join('、')}）` : '全库';
        results.push({ goods, ok:false, msg:`${scope}空闲库位不足（需要${qty}个，仅剩${result.available}个）` });
        continue;
      }
      const codes = result.codes;
      const order = nextOrderNo('RK');
      codes.forEach(c => { status[c] = 'occupied'; });
      log.push({
        id: Date.now() + Math.random(), time: new Date().toLocaleString('zh-CN'),
        order, goods, qty, zone: zones ? zones.join('、') : '不限', codes, type: '入库', operator: currentUser
      });
      results.push({ goods, ok:true, msg: codes.join('、') });
    }
    return results;
  }

      <td style="padding:5px 4px; border-bottom:1px solid #232a38; font-family:var(--mono); font-size:11px;">${escapeHtml(r.msg)}</td>
    </tr>`).join('');
  }

  function rescaleGridForFullscreen(){
    const wrapper = document.getElementById('gridScaleWrapper');
    if(!isFullscreen()){
      grid.style.transform = '';

      wrapper.style.height = '';
      return;
    }
    // 先重置，测出网格未缩放时的原始尺寸
    grid.style.transform = 'none';
    const gridRect = grid.getBoundingClientRect();
    const legend = mapPane.querySelector('.legend');
    const header = mapPane.querySelector('div');
    const reservedHeight = (legend ? legend.offsetHeight : 0) + (header ? header.offsetHeight : 0) + 80;
    const availWidth = window.innerWidth - 48;
    const availHeight = window.innerHeight - reservedHeight;
    const scale = Math.max(Math.min(availWidth / gridRect.width, availHeight / gridRect.height, 3), 0.3);
    grid.style.transform = `scale(${scale})`;
    // wrapper 尺寸设为缩放后的实际占位大小，这样外层 flex 居中才会准确，不会把内容推出屏幕
    wrapper.style.width = (gridRect.width * scale) + 'px';
    wrapper.style.height = (gridRect.height * scale) + 'px';
  }

  async function init(){
    buildStaticBlocks();
    buildLocationCells();
    buildZoneOptions();
    loadOperatorName();
    await loadState();
    refreshAllVisuals();
    renderLog();
    document.getElementById('fOrder').placeholder = nextOrderNo('RK');
  }
  init();
})();

</script>
